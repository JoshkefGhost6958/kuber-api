{% extends "admin/change_form.html" %}

{% block extrahead %}{{ block.super }}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="anonymous"></script>
{% endblock %}

{% block after_field_sets %}{{ block.super }}
<div style="margin:16px 0;max-width:780px;">
  <p style="margin:0 0 8px;font-weight:600;">
    Pick the location — click the map or drag the pin (lat/lng fill in automatically).
  </p>
  <button type="button" id="kuber-use-loc"
          style="margin-bottom:8px;padding:6px 12px;cursor:pointer;">
    📍 Use my current location
  </button>
  <div id="kuber-admin-map"
       style="height:380px;border-radius:8px;border:1px solid #ccc;"></div>
</div>
<script>
(function () {
  function init() {
    var latEl = document.getElementById("id_latitude");
    var lngEl = document.getElementById("id_longitude");
    var mapEl = document.getElementById("kuber-admin-map");
    if (!latEl || !lngEl || !mapEl || !window.L) { return setTimeout(init, 100); }

    var lat = parseFloat(latEl.value);
    var lng = parseFloat(lngEl.value);
    if (isNaN(lat) || isNaN(lng)) { lat = -0.4986; lng = 37.2803; } // Kerugoya

    var map = L.map(mapEl).setView([lat, lng], 14);
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png",
      { subdomains: "abcd" }
    ).addTo(map);

    var marker = L.marker([lat, lng], { draggable: true }).addTo(map);
    function set(ll) {
      latEl.value = ll.lat.toFixed(6);
      lngEl.value = ll.lng.toFixed(6);
    }
    map.on("click", function (e) { marker.setLatLng(e.latlng); set(e.latlng); });
    marker.on("dragend", function () { set(marker.getLatLng()); });

    var btn = document.getElementById("kuber-use-loc");
    if (btn) {
      btn.onclick = function () {
        if (!navigator.geolocation) { alert("Geolocation not available."); return; }
        navigator.geolocation.getCurrentPosition(function (p) {
          var ll = L.latLng(p.coords.latitude, p.coords.longitude);
          map.setView(ll, 16); marker.setLatLng(ll); set(ll);
        }, function () { alert("Could not get your location."); });
      };
    }
    setTimeout(function () { map.invalidateSize(); }, 300);
  }
  if (document.readyState !== "loading") init();
  else document.addEventListener("DOMContentLoaded", init);
})();
</script>
{% endblock %}
